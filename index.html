:root {
  --color-primary: #0F172A;
  --color-on-primary: #FFFFFF;
  --color-secondary: #334155;
  --color-accent: #0369A1;
  --color-accent-light: #E0F2FE;
  --color-background: #F8FAFC;
  --color-surface: #FFFFFF;
  --color-foreground: #020617;
  --color-muted: #E8ECF1;
  --color-muted-fg: #64748B;
  --color-border: #E2E8F0;
  --color-destructive: #DC2626;
  --color-ring: #0369A1;

  --tag-positive: #15803D;   --tag-positive-bg: #F0FDF4; --tag-positive-border: #BBF7D0;
  --tag-structural: #0369A1; --tag-structural-bg: #F0F9FF; --tag-structural-border: #BAE6FD;
  --tag-risk: #B91C1C;       --tag-risk-bg: #FEF2F2;      --tag-risk-border: #FECACA;
  --tag-watch: #B45309;      --tag-watch-bg: #FFFBEB;     --tag-watch-border: #FDE68A;

  --chart-1: #0369A1; --chart-2: #15803D; --chart-3: #B45309; --chart-4: #7C3AED; --chart-5: #DC2626; --chart-6: #0891B2; --chart-7: #BE185D; --chart-8: #4D7C0F;

  --font-heading: 'Libre Bodoni', Georgia, serif;
  --font-body: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;

  --sidebar-width: 288px;
  --radius: 10px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--color-background);
  color: var(--color-foreground);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; line-height: 1.2; margin: 0 0 0.4em; color: var(--color-primary); }
p { margin: 0 0 1em; }
a { color: var(--color-accent); }
button { font-family: var(--font-body); cursor: pointer; }
::selection { background: var(--color-accent-light); }

*:focus-visible {
  outline: 3px solid var(--color-ring);
  outline-offset: 2px;
  border-radius: 4px;
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

.skip-link {
  position: absolute; left: -999px; top: 0; background: var(--color-primary); color: #fff;
  padding: 10px 16px; z-index: 200; border-radius: 0 0 8px 0;
}
.skip-link:focus { left: 0; }

/* ---------- Layout ---------- */
#app { display: flex; min-height: 100vh; }

#sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--color-primary);
  color: #E2E8F0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform 220ms ease;
}
.sidebar-brand {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-brand .mark { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
.sidebar-brand .sub { font-size: 0.72rem; color: #94A3B8; margin-top: 3px; letter-spacing: 0.02em; text-transform: uppercase; }

.nav-group { padding: 14px 12px 4px; }
.nav-group-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748B; padding: 6px 10px; font-weight: 600; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left; background: none; border: none; color: #CBD5E1;
  padding: 9px 10px; border-radius: 7px; font-size: 0.875rem; font-family: var(--font-body);
  transition: background 150ms, color 150ms;
}
.nav-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
.nav-link.active { background: var(--color-accent); color: #fff; font-weight: 600; }
.nav-link .num { opacity: 0.6; font-variant-numeric: tabular-nums; font-size: 0.78em; width: 1.4em; flex-shrink: 0; }
.nav-link.active .num { opacity: 0.9; }

#dept-list { max-height: none; }
.dept-toggle { display: flex; justify-content: space-between; }
.dept-toggle svg { transition: transform 150ms; flex-shrink: 0; }
.dept-toggle[aria-expanded="false"] + #dept-list { display: none; }
.dept-toggle[aria-expanded="false"] svg { transform: rotate(-90deg); }

#topbar {
  display: none;
  position: sticky; top: 0; z-index: 90;
  background: var(--color-surface); border-bottom: 1px solid var(--color-border);
  padding: 12px 16px; align-items: center; gap: 12px;
}
#menu-toggle { background: none; border: 1px solid var(--color-border); border-radius: 8px; padding: 8px; display: flex; }
#topbar .title { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; color: var(--color-primary); }
#sidebar-scrim { display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.5); z-index: 95; }

main {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-width: 0;
  padding: 40px 48px 80px;
}

@media (max-width: 900px) {
  #sidebar { transform: translateX(-100%); box-shadow: var(--shadow-md); }
  #sidebar.open { transform: translateX(0); }
  #sidebar-scrim.show { display: block; }
  #topbar { display: flex; }
  main { margin-left: 0; padding: 24px 18px 60px; }
}

.view { display: none; }
.view.active { display: block; animation: fadein 260ms ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ---------- Common components ---------- */
.eyebrow { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-accent); font-weight: 700; margin-bottom: 8px; }
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 1.9rem; }
.page-header .subtitle { color: var(--color-muted-fg); font-size: 1.05rem; font-style: italic; }
.section-title { font-size: 1.3rem; margin-top: 40px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--color-border); }
.section-title:first-of-type { margin-top: 0; }
.prose { max-width: 78ch; color: #1E293B; }
.prose + .prose { margin-top: -0.4em; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin: 20px 0 32px; }
.kpi-card {
  background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius);
  padding: 16px 18px; box-shadow: var(--shadow-sm);
}
.kpi-value { font-family: var(--font-heading); font-size: 1.55rem; font-weight: 700; color: var(--color-primary); font-variant-numeric: tabular-nums; line-height: 1.15; }
.kpi-label { font-size: 0.82rem; color: var(--color-muted-fg); margin-top: 4px; }
.kpi-delta { font-size: 0.78rem; margin-top: 6px; font-weight: 600; }
.kpi-delta.up { color: var(--tag-positive); }
.kpi-delta.down { color: var(--tag-risk); }
.kpi-delta.neutral { color: var(--color-muted-fg); }

.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 20px 22px; margin-bottom: 22px; }
.card > h4 { font-size: 1rem; margin-bottom: 14px; }

.table-wrap { overflow-x: auto; margin-bottom: 22px; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-surface); box-shadow: var(--shadow-sm); }
table { width: 100%; border-collapse: collapse; font-size: 0.89rem; }
caption { text-align: left; font-weight: 700; padding: 14px 16px 10px; font-family: var(--font-heading); color: var(--color-primary); font-size: 1rem; caption-side: top; }
thead th { text-align: left; background: var(--color-muted); color: var(--color-secondary); font-weight: 700; padding: 9px 14px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; position: sticky; top: 0; }
tbody td { padding: 9px 14px; border-top: 1px solid var(--color-border); font-variant-numeric: tabular-nums; }
tbody td:first-child { font-variant-numeric: normal; font-weight: 500; }
tbody tr:nth-child(even) { background: #FBFCFD; }
tbody tr:hover { background: var(--color-accent-light); }
.table-footnote { padding: 8px 16px 12px; font-size: 0.8rem; color: var(--color-muted-fg); font-style: italic; }

.chart-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 18px 20px 12px; margin-bottom: 22px; }
.chart-card h4 { font-size: 0.92rem; margin-bottom: 12px; color: var(--color-secondary); }
.chart-container { position: relative; width: 100%; }
.charts-row { display: grid; grid-template-columns: 1fr; gap: 18px; }
.charts-row.cols-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }

.note-box {
  background: var(--tag-watch-bg); border: 1px solid var(--tag-watch-border); border-left: 4px solid var(--tag-watch);
  border-radius: 8px; padding: 12px 16px; font-size: 0.87rem; color: #78350F; margin: 4px 0 24px;
}

.interp-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.interp-item {
  border-radius: 8px; padding: 12px 16px 12px 14px; border: 1px solid; border-left-width: 4px;
  font-size: 0.92rem; line-height: 1.55;
}
.interp-item .tag-label { display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 1px 7px; border-radius: 4px; margin-right: 8px; vertical-align: 1px; }
.interp-item.tag-positive { background: var(--tag-positive-bg); border-color: var(--tag-positive-border); border-left-color: var(--tag-positive); }
.interp-item.tag-positive .tag-label { background: var(--tag-positive); color: #fff; }
.interp-item.tag-structural { background: var(--tag-structural-bg); border-color: var(--tag-structural-border); border-left-color: var(--tag-structural); }
.interp-item.tag-structural .tag-label { background: var(--tag-structural); color: #fff; }
.interp-item.tag-risk { background: var(--tag-risk-bg); border-color: var(--tag-risk-border); border-left-color: var(--tag-risk); }
.interp-item.tag-risk .tag-label { background: var(--tag-risk); color: #fff; }
.interp-item.tag-watch { background: var(--tag-watch-bg); border-color: var(--tag-watch-border); border-left-color: var(--tag-watch); }
.interp-item.tag-watch .tag-label { background: var(--tag-watch); color: #fff; }

.legend-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 26px; }
.legend-chip { display: inline-flex; align-items: center; gap: 7px; border: 1px solid; border-radius: 999px; padding: 5px 12px 5px 10px; font-size: 0.8rem; }
.legend-chip .dot { width: 9px; height: 9px; border-radius: 50%; }

/* ---------- Home / hero ---------- */
.hero { padding: 8px 0 8px; }
.hero .eyebrow { color: var(--color-accent); }
.hero h1 { font-size: 2.5rem; max-width: 16ch; }
.hero .lede { font-size: 1.12rem; color: var(--color-secondary); max-width: 62ch; margin-top: 10px; }
.hero-meta { font-size: 0.85rem; color: var(--color-muted-fg); margin-top: 14px; border-top: 1px solid var(--color-border); padding-top: 14px; max-width: 62ch; }
.hero-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin: 30px 0; }
.hero-kpis .kpi-card { background: var(--color-primary); border-color: var(--color-primary); }
.hero-kpis .kpi-value { color: #fff; }
.hero-kpis .kpi-label { color: #94A3B8; }

.highlight-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
.highlight-list li { display: flex; gap: 12px; padding: 14px 16px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.93rem; }
.highlight-list li .bullet-mark { color: var(--color-accent); font-weight: 700; flex-shrink: 0; }

.tag-method-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin: 16px 0 8px; }
.tag-method-card { border-radius: 8px; padding: 12px 14px; border: 1px solid; font-size: 0.85rem; }

/* ---------- Department grid (overview of departments) ---------- */
.dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; margin: 20px 0 10px; }
.dept-card {
  text-align: left; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius);
  padding: 16px 18px; box-shadow: var(--shadow-sm); transition: transform 150ms, box-shadow 150ms, border-color 150ms;
  display: flex; flex-direction: column; gap: 4px;
}
.dept-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--color-accent); }
.dept-card .dnum { font-size: 0.7rem; color: var(--color-muted-fg); font-weight: 700; }
.dept-card .dname { font-family: var(--font-heading); font-weight: 600; color: var(--color-primary); font-size: 1rem; }
.dept-card .dval { font-size: 1.15rem; font-weight: 700; color: var(--color-accent); margin-top: 4px; font-variant-numeric: tabular-nums; }
.dept-card .ddelta { font-size: 0.78rem; color: var(--color-muted-fg); }

/* ---------- Department detail ---------- */
.dept-nav-crumb { font-size: 0.85rem; color: var(--color-muted-fg); margin-bottom: 6px; }
.dept-nav-crumb button { background: none; border: none; color: var(--color-accent); padding: 0; font-size: inherit; text-decoration: underline; }
.prev-next-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 44px; padding-top: 20px; border-top: 1px solid var(--color-border); }
.pn-btn { display: flex; flex-direction: column; gap: 2px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; color: var(--color-secondary); max-width: 46%; }
.pn-btn:hover { border-color: var(--color-accent); }
.pn-btn .pn-label { font-size: 0.7rem; text-transform: uppercase; color: var(--color-muted-fg); letter-spacing: 0.05em; }
.pn-btn.next { text-align: right; margin-left: auto; }

/* ---------- Policy ---------- */
.policy-cluster { margin-bottom: 26px; }
.policy-cluster h3 { font-size: 1.08rem; display: flex; align-items: baseline; gap: 10px; }
.policy-cluster h3 .cnum { color: var(--color-accent); font-family: var(--font-body); font-weight: 800; font-size: 0.95rem; }
.policy-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.policy-item { background: var(--color-surface); border: 1px solid var(--color-border); border-left: 4px solid var(--color-accent); border-radius: 8px; padding: 13px 16px; }
.policy-item h5 { margin: 0 0 6px; font-size: 0.92rem; color: var(--color-primary); font-family: var(--font-body); font-weight: 700; }
.policy-item p { margin: 0; font-size: 0.85rem; color: var(--color-secondary); }

footer.site-footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--color-border); font-size: 0.8rem; color: var(--color-muted-fg); }

.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

<script>
/* ==========================================================================
   Gujarat State Budget 2026-27 — application logic
   ========================================================================== */
(function () {
  "use strict";

  const CHART_COLORS = ["#0369A1", "#15803D", "#B45309", "#7C3AED", "#DC2626", "#0891B2", "#BE185D", "#4D7C0F"];
  const inr = (n, opts) => new Intl.NumberFormat("en-IN", { maximumFractionDigits: (n % 1 !== 0) ? 2 : 0, ...opts }).format(n);
  const money = (n) => "₹" + inr(n) + " Cr";
  const yearLabelRe = /^(19|20)\d{2}/;
  const isYearAxis = (labels) => labels.every((l) => yearLabelRe.test(String(l)));

  Chart.defaults.font.family = "'Public Sans', sans-serif";
  Chart.defaults.color = "#334155";
  Chart.defaults.borderColor = "#E2E8F0";

  /* ---------------- Chart builders ---------------- */
  function baseGrid(horizontal) {
    return {
      x: { grid: { display: horizontal, color: "#EEF2F6" }, ticks: horizontal ? { callback: (v) => inr(v) } : {}, border: { display: false } },
      // reverse: true on a horizontal (indexAxis:'y') chart keeps label[0] at the top,
      // matching reading order and the table row order directly above each chart.
      y: { reverse: horizontal, grid: { display: !horizontal, color: "#EEF2F6" }, ticks: !horizontal ? { callback: (v) => inr(v) } : {}, border: { display: false } },
    };
  }

  function makeBarChart(canvas, cfg) {
    const { labels, data } = cfg;
    const horizontal = !!cfg.horizontal;
    const categorical = !isYearAxis(labels) && !cfg.diverging;
    const colors = cfg.diverging
      ? data.map((v) => (v >= 0 ? "#0369A1" : "#DC2626"))
      : categorical
      ? labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length])
      : "#0369A1";
    return new Chart(canvas, {
      type: "bar",
      data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4, maxBarThickness: 46 }] },
      options: {
        indexAxis: horizontal ? "y" : "x",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => (cfg.diverging ? `z = ${ctx.parsed.x ?? ctx.parsed.y}` : money(ctx.parsed.x ?? ctx.parsed.y)) } },
        },
        scales: baseGrid(horizontal),
      },
    });
  }

  function makeGroupedChart(canvas, cfg) {
    const datasets = cfg.series.map((s, i) => ({
      label: s.label,
      data: s.data,
      backgroundColor: CHART_COLORS[i % CHART_COLORS.length],
      borderRadius: 4,
      maxBarThickness: 34,
    }));
    return new Chart(canvas, {
      type: "bar",
      data: { labels: cfg.labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "bottom", labels: { boxWidth: 11, padding: 14, font: { size: 11.5 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${money(ctx.parsed.y)}` } },
        },
        scales: baseGrid(false),
      },
    });
  }

  function makeDonutChart(canvas, cfg) {
    return new Chart(canvas, {
      type: "doughnut",
      data: {
        labels: cfg.labels,
        datasets: [{ data: cfg.data, backgroundColor: cfg.labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]), borderWidth: 2, borderColor: "#fff" }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "58%",
        plugins: {
          legend: { position: "bottom", labels: { boxWidth: 11, padding: 12, font: { size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${money(ctx.parsed)} (${((ctx.parsed / ctx.dataset.data.reduce((a, b) => a + b, 0)) * 100).toFixed(1)}%)` } },
        },
      },
    });
  }

  function renderChartByConfig(canvas, cfg) {
    const type = cfg.type === "grouped-bar" ? "grouped" : cfg.type === "hbar" ? "bar" : cfg.type;
    const horizontal = cfg.type === "hbar" ? true : cfg.horizontal;
    if (type === "donut") return makeDonutChart(canvas, cfg);
    if (type === "grouped") return makeGroupedChart(canvas, cfg);
    return makeBarChart(canvas, { ...cfg, horizontal, diverging: cfg.zeroLine });
  }

  // Charts are only instantiated once their view is actually shown (canvases in
  // display:none ancestors render at 0 size). We queue {canvas, cfg} pairs per view.
  const pendingCharts = [];
  function queueChart(canvas, cfg) { pendingCharts.push({ canvas, cfg }); }
  function flushPendingCharts() {
    while (pendingCharts.length) {
      const { canvas, cfg } = pendingCharts.shift();
      if (canvas.isConnected) renderChartByConfig(canvas, cfg);
    }
  }

  /* ---------------- Small component builders ---------------- */
  function kpiGrid(kpis, heroStyle) {
    return `<div class="${heroStyle ? "hero-kpis" : "kpi-grid"}">` + kpis.map((k) => {
      const dir = (k.delta || "").startsWith("↑") ? "up" : (k.delta || "").startsWith("↓") ? "down" : "neutral";
      return `<div class="kpi-card"><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div>${k.delta ? `<div class="kpi-delta ${dir}">${k.delta}</div>` : ""}</div>`;
    }).join("") + `</div>`;
  }

  function chartCardHTML(id, title) {
    return `<div class="chart-card">${title ? `<h4>${title}</h4>` : ""}<div class="chart-container" style="height:290px"><canvas id="${id}"></canvas></div></div>`;
  }

  let chartIdCounter = 0;
  function tableBlock(table, opts) {
    opts = opts || {};
    const chartId = `c${chartIdCounter++}`;
    let html = "";
    if (table.chart) html += chartCardHTML(chartId, opts.chartTitle || null);
    html += `<div class="table-wrap"><table><caption>${table.title}</caption><thead><tr>${table.cols.map((c) => `<th>${c}</th>`).join("")}</tr></thead><tbody>`;
    table.rows.forEach((row) => { html += `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`; });
    html += `</tbody></table>${table.footnote ? `<div class="table-footnote">${table.footnote}</div>` : ""}</div>`;
    return { html, chartId, chart: table.chart };
  }

  function renderTableBlocks(container, tables) {
    const toQueue = [];
    let html = "";
    tables.forEach((t) => {
      const block = tableBlock(t);
      html += block.html;
      if (block.chart) toQueue.push(block);
    });
    container.insertAdjacentHTML("beforeend", html);
    toQueue.forEach((b) => queueChart(document.getElementById(b.chartId), b.chart));
  }

  function interpList(items) {
    return `<ul class="interp-list">` + items.map((it) => {
      const t = TAGS[it.tag] || TAGS.structural;
      return `<li class="interp-item tag-${it.tag}"><span class="tag-label">${t.label}</span>${it.text}</li>`;
    }).join("") + `</ul>`;
  }

  function legendRow() {
    return `<div class="legend-row">` + Object.entries(TAGS).map(([key, t]) =>
      `<span class="legend-chip" style="border-color:${t.border};background:${t.bg};color:${t.color}"><span class="dot" style="background:${t.color}"></span>${t.label}</span>`
    ).join("") + `</div>`;
  }

  /* ---------------- View renderers ---------------- */
  function renderHome(container) {
    const r = REPORT;
    container.innerHTML = `
      <div class="hero">
        <div class="eyebrow">Financial Analysis Report · 2026-27</div>
        <h1>${r.title}</h1>
        <p class="lede">${r.subtitle}</p>
        <div class="hero-meta">Prepared by ${r.submittedBy}, under the guidance of ${r.guidance}. Submitted to ${r.submittedTo}.<br>${r.disclaimer}</div>
      </div>
      ${kpiGrid(r.heroKpis, true)}

      <h2 class="section-title">Executive Summary</h2>
      ${kpiGrid(r.execSummary.kpis)}
      <div class="prose"><h3 style="font-size:1.05rem">Fiscal Position</h3><p>${r.execSummary.fiscalPosition}</p></div>
      <div class="prose"><h3 style="font-size:1.05rem">Departmental Trends</h3><p>${r.execSummary.departmentalTrends}</p></div>
      <h3 style="font-size:1.05rem;margin-top:24px">Key Highlights</h3>
      <ul class="highlight-list">${r.execSummary.keyHighlights.map((h) => `<li><span class="bullet-mark">→</span><span>${h}</span></li>`).join("")}</ul>

      <h2 class="section-title">Methodology at a Glance</h2>
      ${kpiGrid(r.methodology.kpis)}
      <div class="prose"><p><strong>Data sources.</strong> ${r.methodology.dataSources}</p>
      <p><strong>Department framework.</strong> ${r.methodology.framework}</p>
      <p><strong>Forecasting (Section 20).</strong> ${r.methodology.forecasting}</p>
      <p><strong>Statistical diagnostics (Section 21).</strong> ${r.methodology.diagnostics}</p></div>

      <h3 style="font-size:1.05rem;margin-top:20px">Interpretive Tagging System</h3>
      <p class="prose" style="font-size:0.9rem">Every callout across this site is tagged using the report's own four-category system, used consistently everywhere below:</p>
      <div class="tag-method-grid">${r.methodology.tagSystem.map((t) => {
        const tg = TAGS[t.tag];
        return `<div class="tag-method-card" style="background:${tg.bg};border-color:${tg.border}"><strong style="color:${tg.color}">${tg.label}</strong><div style="margin-top:4px;color:#334155">${t.text}</div></div>`;
      }).join("")}</div>
      <p class="prose" style="font-size:0.87rem;margin-top:14px;color:var(--color-muted-fg)"><strong>Scope & limitations.</strong> ${r.methodology.scope}</p>

      <footer class="site-footer">Figures reproduced from Gujarat's published State Budget 2026-27 documents. This is an independent analytical synthesis, not an official Government of Gujarat publication.</footer>
    `;
  }

  function renderOverview(container) {
    const o = REPORT.overview;
    let html = `<div class="page-header"><div class="eyebrow">Section 1</div><h1>Gujarat Budget at a Glance</h1><p class="subtitle">Overall fiscal position, revenue composition and top departmental allocations, 2026-27 BE</p></div>`;
    html += kpiGrid(o.kpis);
    html += `<div class="note-box">${o.note}</div>`;
    container.innerHTML = html;
    renderTableBlocks(container, [o.table1, o.table2, o.table3, o.table4]);
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">Interpretation</h2>${interpList(o.interpretation)}`);
  }

  function renderDepartmentsGrid(container) {
    let html = `<div class="page-header"><div class="eyebrow">Sections 2–19</div><h1>All Departments</h1><p class="subtitle">18 departments analysed in detail — tap any card for the full breakdown</p></div>`;
    html += `<div class="dept-grid">` + REPORT.departments.map((d) => `
      <button class="dept-card" data-goto="dept-${d.id}">
        <span class="dnum">SECTION ${d.num}</span>
        <span class="dname">${d.name}</span>
        <span class="dval">${d.kpis[0].value}</span>
        <span class="ddelta">${d.kpis[0].label}${d.kpis[0].delta ? " · " + d.kpis[0].delta : ""}</span>
      </button>`).join("") + `</div>`;
    container.innerHTML = html;
  }

  function renderDepartmentDetail(container, dept) {
    const idx = REPORT.departments.findIndex((d) => d.id === dept.id);
    const prev = REPORT.departments[idx - 1];
    const next = REPORT.departments[idx + 1];
    let html = `
      <div class="dept-nav-crumb"><button data-goto="departments">All Departments</button> / Section ${dept.num}</div>
      <div class="page-header"><div class="eyebrow">Section ${dept.num} · Department Profile</div><h1>${dept.name}</h1><p class="subtitle">${dept.subtitle}</p></div>
      ${kpiGrid(dept.kpis)}
    `;
    container.innerHTML = html;
    renderTableBlocks(container, dept.tables);
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">Interpretation</h2>${interpList(dept.interpretation)}`);
    container.insertAdjacentHTML("beforeend", `
      <div class="prev-next-row">
        ${prev ? `<button class="pn-btn prev" data-goto="dept-${prev.id}"><span class="pn-label">← Previous</span><span>${prev.name}</span></button>` : `<span></span>`}
        ${next ? `<button class="pn-btn next" data-goto="dept-${next.id}"><span class="pn-label">Next →</span><span>${next.name}</span></button>` : `<span></span>`}
      </div>`);
  }

  function renderForecast(container) {
    const f = REPORT.forecast;
    let html = `<div class="page-header"><div class="eyebrow">Section 20</div><h1>Budget Forecast &amp; Predictive Analysis</h1><p class="subtitle">Trend projections to 2029-30 using OLS linear regression and log-linear CAGR models</p></div>`;
    html += kpiGrid(f.kpis);
    html += `<div class="prose"><p><strong>Methodology.</strong> ${f.methodology}</p><p><strong>Data basis.</strong> ${f.dataBasis}</p></div>`;
    container.innerHTML = html;
    renderTableBlocks(container, [f.table1, f.table3, f.table4, f.table2]);
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">Interpretation</h2>${interpList(f.interpretation)}`);
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">Limitations of the Predictive Model</h2><ul class="highlight-list">${f.limitations.map((l) => `<li><span class="bullet-mark">!</span><span>${l}</span></li>`).join("")}</ul>`);
  }

  function renderStats(container) {
    const s = REPORT.stats;
    let html = `<div class="page-header"><div class="eyebrow">Section 21</div><h1>Statistical Analysis: Distribution-Based Diagnostics</h1><p class="subtitle">Descriptive statistics, Normal, Chi-Square, Log-Normal and correlation diagnostics on department-level figures</p></div>`;
    html += kpiGrid(s.kpis);
    html += `<p class="prose">${s.intro}</p>`;
    container.innerHTML = html;

    // A. Descriptive
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">${s.descriptive.title}</h2>`);
    renderTableBlocks(container, [s.descriptive.table]);
    container.insertAdjacentHTML("beforeend", s.descriptive.narrative.map((p) => `<p class="prose">${p}</p>`).join(""));

    // B. Normal
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">${s.normal.title}</h2><p class="prose">${s.normal.intro}</p>`);
    renderTableBlocks(container, [s.normal.table]);
    container.insertAdjacentHTML("beforeend", s.normal.narrative.map((p) => `<p class="prose">${p}</p>`).join(""));

    // C. Chi-square
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">${s.chisquare.title}</h2><p class="prose">${s.chisquare.intro}</p>`);
    renderTableBlocks(container, [s.chisquare.table3]);
    container.insertAdjacentHTML("beforeend", `<p class="prose">${s.chisquare.midNarrative}</p>`);
    renderTableBlocks(container, [s.chisquare.table4]);
    container.insertAdjacentHTML("beforeend", `<p class="prose" style="font-weight:600">${s.chisquare.table4.resultLine}</p>`);
    container.insertAdjacentHTML("beforeend", s.chisquare.narrative.map((p) => `<p class="prose">${p}</p>`).join(""));

    // D. Log-normal
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">${s.lognormal.title}</h2><p class="prose">${s.lognormal.intro}</p>`);
    renderTableBlocks(container, [s.lognormal.table5]);
    container.insertAdjacentHTML("beforeend", `<p class="prose">${s.lognormal.midNarrative}</p>`);
    renderTableBlocks(container, [s.lognormal.table6]);
    container.insertAdjacentHTML("beforeend", s.lognormal.narrative.map((p) => `<p class="prose">${p}</p>`).join(""));

    // E. Correlation
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">${s.correlation.title}</h2><p class="prose">${s.correlation.intro}</p>`);
    renderTableBlocks(container, [s.correlation.table]);
    container.insertAdjacentHTML("beforeend", s.correlation.narrative.map((p) => `<p class="prose">${p}</p>`).join(""));

    // Synthesis
    container.insertAdjacentHTML("beforeend", `<h2 class="section-title">Reading the Diagnostics Together</h2><p class="prose">${s.synthesis}</p>`);
  }

  function renderPolicy(container) {
    const p = REPORT.policy;
    let html = `<div class="page-header"><div class="eyebrow">Section 22</div><h1>Policy Recommendations</h1><p class="subtitle">${p.intro}</p></div>`;
    html += p.clusters.map((c) => `
      <div class="policy-cluster">
        <h3><span class="cnum">${c.num}.</span> ${c.dept}</h3>
        <div class="policy-items">${c.items.map((it) => `<div class="policy-item"><h5>${it.title}</h5><p>${it.text}</p></div>`).join("")}</div>
      </div>`).join("");
    html += `<footer class="site-footer">End of report. ${REPORT.disclaimer}</footer>`;
    container.innerHTML = html;
  }

  /* ---------------- Sidebar + navigation ---------------- */
  const VIEWS = {};
  function registerView(id, label, renderFn, opts) {
    VIEWS[id] = { label, render: renderFn, rendered: false, ...opts };
  }
  registerView("home", "Home & Summary", renderHome);
  registerView("overview", "Budget at a Glance", renderOverview);
  registerView("departments", "All Departments", renderDepartmentsGrid);
  REPORT.departments.forEach((d) => registerView(`dept-${d.id}`, d.name, (c) => renderDepartmentDetail(c, d)));
  registerView("forecast", "Forecast 2027-30", renderForecast);
  registerView("stats", "Statistical Diagnostics", renderStats);
  registerView("policy", "Policy Recommendations", renderPolicy);

  function buildSidebar() {
    const nav = document.getElementById("sidebar-nav");
    let html = `
      <div class="nav-group">
        <div class="nav-group-label">Report</div>
        <button class="nav-link" data-goto="home"><span class="num">—</span>Home &amp; Summary</button>
        <button class="nav-link" data-goto="overview"><span class="num">01</span>Budget at a Glance</button>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Departments</div>
        <button class="nav-link" data-goto="departments"><span class="num">⊞</span>All Departments</button>
        <button class="nav-link dept-toggle" id="dept-toggle" aria-expanded="true">
          <span>Browse individually</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="dept-list">
          ${REPORT.departments.map((d) => `<button class="nav-link" data-goto="dept-${d.id}" style="padding-left:22px;font-size:0.82rem"><span class="num">${String(d.num).padStart(2, "0")}</span>${d.name}</button>`).join("")}
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Analysis</div>
        <button class="nav-link" data-goto="forecast"><span class="num">20</span>Forecast 2027-30</button>
        <button class="nav-link" data-goto="stats"><span class="num">21</span>Statistical Diagnostics</button>
        <button class="nav-link" data-goto="policy"><span class="num">22</span>Policy Recommendations</button>
      </div>
    `;
    nav.innerHTML = html;
    document.getElementById("dept-toggle").addEventListener("click", (e) => {
      const btn = e.currentTarget;
      const expanded = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", String(!expanded));
    });
  }

  let currentView = null;
  function showView(id) {
    if (!VIEWS[id]) id = "home";
    const view = VIEWS[id];
    const el = document.getElementById(`view-${id}`);
    if (!view.rendered) {
      view.render(el);
      view.rendered = true;
    }
    document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
    el.classList.add("active");
    flushPendingCharts();
    document.querySelectorAll(".nav-link[data-goto]").forEach((btn) => btn.classList.toggle("active", btn.dataset.goto === id));
    // if navigating to a department, expand+reveal it and open the browse-individually list
    if (id.startsWith("dept-")) {
      const list = document.getElementById("dept-list");
      const toggle = document.getElementById("dept-toggle");
      if (list && toggle) toggle.setAttribute("aria-expanded", "true");
    }
    currentView = id;
    document.getElementById("main-content").scrollTop = 0;
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
    closeSidebarMobile();
    history.replaceState(null, "", `#${id}`);
  }

  function openSidebarMobile() { document.getElementById("sidebar").classList.add("open"); document.getElementById("sidebar-scrim").classList.add("show"); }
  function closeSidebarMobile() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("sidebar-scrim").classList.remove("show"); }

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-goto]");
    if (btn) { showView(btn.dataset.goto); }
  });

  window.addEventListener("DOMContentLoaded", () => {
    buildSidebar();
    Object.keys(VIEWS).forEach((id) => {
      const section = document.createElement("section");
      section.id = `view-${id}`;
      section.className = "view";
      document.getElementById("main-content").appendChild(section);
    });
    document.getElementById("menu-toggle").addEventListener("click", openSidebarMobile);
    document.getElementById("sidebar-scrim").addEventListener("click", closeSidebarMobile);
    const startId = (location.hash || "#home").slice(1);
    showView(VIEWS[startId] ? startId : "home");
  });
})();

</script>
</body>
</html>
